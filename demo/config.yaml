# Constat Demo Configuration
# Run from project root: constat repl -c demo/config.yaml

# Server configuration (for API server mode)
server:
  admin_token: "my-dev-token"
  auth_disabled: ${AUTH_DISABLED}
  firebase_project_id: ${FIREBASE_PROJECT_ID}
  # firebase_api_key: set FIREBASE_API_KEY env var for server-side Firebase login
  # runtime_dir: .  # Base directory for .constat/ data (default: current directory)

  # Local users for server-local auth (no Firebase required)
  # Generate password hashes with: constat hash-password
  local_users:
    demo:
      password_hash: "scrypt:e5371a58d7f5c57b5e68204c56f7b4de:9e90506de74a35fffe9b0389c4f651dcc558ef0518ef10f75f6712b967a329b9"
      email: demo@localhost

  # User permissions - include from separate file for easier management
  permissions:
    $ref: ./permissions.yaml

# Domain composition (filesystem is authority, list defines DAG)
domains:
  - sales-analytics
  - hr-reporting

llm:
#  provider: ollama
#  model: qwen2.5:7b
   provider: anthropic
   model: claude-sonnet-4-20250514
   api_key: ${ANTHROPIC_API_KEY}

   task_routing:
     # Document analysis — Opus for nuanced extraction
     glossary_generation:
       models:
         - provider: anthropic
           model: claude-opus-4-20250514
           timeout_seconds: 180
     relationship_extraction:
       models:
         - provider: anthropic
           model: claude-opus-4-20250514
           timeout_seconds: 180
     # Planning — Opus for multi-step reasoning, Sonnet for simple lookups
     planning:
       models:
         - provider: anthropic
           model: claude-opus-4-20250514
           timeout_seconds: 180
       low_complexity_models:
         - provider: anthropic
           model: claude-sonnet-4-20250514
           timeout_seconds: 60
     # Code gen — Llama fast path, Sonnet fallback
     sql_generation:
       models:
         - provider: together
           model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
           timeout_seconds: 15
         - provider: anthropic
           model: claude-sonnet-4-20250514
           timeout_seconds: 120
     python_analysis:
       models:
         - provider: together
           model: meta-llama/Meta-Llama-3.1-8B-Instruct-Turbo
           timeout_seconds: 15
         - provider: anthropic
           model: claude-sonnet-4-20250514
           timeout_seconds: 120

# Vector store and clustering
storage:
  vector_store:
    # store_chunk_text: true    # store original text in embeddings (disable for large datasets)
    # cluster_min_terms: 2     # minimum terms to trigger clustering
    # cluster_divisor: 5       # k = max(2, n_terms // divisor)
    # cluster_max_k: null      # optional cap on k

# Email configuration for send_email() in generated code
email:
  smtp_host: ${SMTP_HOST}
  smtp_port: ${SMTP_PORT}
  smtp_user: ${SMTP_USER}
  smtp_password: ${SMTP_PASSWORD}
  from_address: ${SMTP_FROM}
  from_name: Constat Demo
  tls: true

# SQL Databases and File-based Data Sources
databases:
  # SQL Databases (SQLite)
  inventory:
    uri: sqlite:///data/inventory.db
    description: |
      Warehouse inventory with warehouses (location, capacity, manager), inventory
      (sku, quantity, reorder_level), and shipments (direction, carrier, date).
      SKUs link to sales.products via naming convention.

  # File-based data sources (CSV, JSON, Parquet, Arrow)
  web_metrics:
    type: csv
    path: data/website_metrics.csv
    description: |
      Daily web analytics by page (90 days). Columns: date, page, visitors,
      page_views, bounce_rate, avg_session_duration

  events:
    type: json
    path: data/events.json
    description: |
      Clickstream events (500 records). Fields: event_id, timestamp, event_type
      (page_view/click/form_submit/purchase/signup/error), source, user_id, properties

  # Generic JDBC example using Xerial SQLite JDBC driver.
  # SQLite has a native Python driver and wouldn't normally use JDBC — this
  # entry exists purely to demonstrate the JDBC config path without needing
  # a proprietary database.  Requires: pip install 'constat[jdbc]'
  #
  chinook_jdbc:
    type: jdbc
    jdbc_driver: org.sqlite.JDBC
    jdbc_url: "jdbc:sqlite:data/chinook.db"
    jar_path:
      - demo/drivers/sqlite-jdbc-3.45.3.0.jar
      - demo/drivers/slf4j-api-2.0.9.jar
      - demo/drivers/slf4j-nop-2.0.9.jar
    description: >
      Chinook sample music-store database (albums, artists, tracks, invoices,
      customers, employees) accessed via Generic JDBC using the Xerial SQLite driver.
      Demonstrates JDBC connectivity with no credentials required.
    read_only: true

databases_description: |
  Three interconnected business databases and two file-based data sources:
  - sales: CRM and order management (customers.tier determines discount)
  - inventory: Multi-warehouse stock management (reorder_level triggers alerts)
  - hr: Employee and performance tracking (ratings affect compensation)
  - web_metrics: Daily web analytics CSV (use file_web_metrics path)
  - events: Clickstream events JSON (use file_events path)

documents:
  images:
    path: data/images/
    description: Sample images for testing the image ingestion pipeline

#   Audio/video transcription example (requires pip install 'constat[audio]')
  meeting_recording:
    path: data/audio
    whisper_model: large-v3        # faster-whisper model (tiny/base/small/medium/large-v3)
    diarize: true                  # Enable speaker diarization via WhisperX
    hf_token: ${HF_TOKEN}          # HuggingFace token (required for diarization)
    language: en                   # Language code (null = auto-detect)

entity_resolution:
  - entity_type: COUNTRY
    source: countries
    query: "{ countries { name code capital continent { name } languages { name } currency } }"
    items_path: countries
    name_field: name

relationships:
  preferred_verbs:
    hierarchy: [MANAGES, REPORTS_TO]
    action: [CREATES, PROCESSES, APPROVES, PLACES]
    flow: [SENDS, RECEIVES, TRANSFERS]
    causation: [DRIVES, REQUIRES, ENABLES]
    temporal: [PRECEDES, FOLLOWS, TRIGGERS]
    association: [REFERENCES, WORKS_IN, PARTICIPATES_IN, USES]

system_prompt: |
  You are a business analyst assistant analyzing company data.

ner_stop_list:
  - api
  - length
  - string
  - int
  - integer
  - graphql
  - JSON
  - code

# External APIs (examples - these are public demo APIs)
apis:
  countries:
    type: graphql
    url: https://countries.trevorblades.com/graphql
    description: |
      Public GraphQL API for country data. Query countries by code,
      get continents, languages, currencies. Useful for geo-enrichment.

  catfacts:
    type: openapi
    url: https://catfact.ninja
    spec_url: https://catfact.ninja/docs
    description: |
      Cat facts and breeds API. Endpoints return paginated responses where the
      actual data is in the 'data' field (e.g., response["data"] for the array of items).
      /breeds returns breed info with country of origin. /facts returns random cat facts.

execution:
  timeout_seconds: 120
  max_retries: 5
  allowed_imports:
    # Data analysis
    - pandas
    - numpy
    - polars
    - statistics
    # Standard library - core
    - json
    - datetime
    - time
    - calendar
    - re
    - math
    - decimal
    - random
    - typing
    # Standard library - data structures
    - collections
    - dataclasses
    - enum
    - heapq
    - bisect
    # Standard library - functional
    - itertools
    - functools
    - operator
    - copy
    # Standard library - strings and text
    - string
    - textwrap
    - pprint
    - html
    # Standard library - files and I/O
    - os
    - pathlib
    - io
    - tempfile
    - csv
    - zipfile
    - gzip
    - struct
    # Standard library - encoding and hashing
    - base64
    - hashlib
    - uuid
    - urllib
    # Visualization
    - plotly
    - altair
    - matplotlib
    - seaborn
    - folium
    # Document and artifact creation
    - openpyxl
    - xlsxwriter
    - docx
    - pptx
    - reportlab
    - pypdf
    - PIL
    - tabulate
